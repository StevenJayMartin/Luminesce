<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lumin Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --bg: #111;
        --fg: #eee;
        --bubble-user: #1e88e5;
        --bubble-assistant: #333;
        --input-bg: #222;
        --input-fg: #fff;
        --accent: #1e88e5;
    }

    body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    #chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        box-sizing: border-box;
    }

    #input-bar {
        display: flex;
        padding: 10px;
        background: var(--input-bg);
        border-top: 1px solid #444;
    }

    #input {
        flex: 1;
        padding: 10px;
        border: none;
        outline: none;
        background: var(--input-bg);
        color: var(--input-fg);
        font-size: 16px;
    }

    #send {
        padding: 10px 20px;
        background: var(--accent);
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
        margin-left: 10px;
    }

    .msg {
        max-width: 80%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 12px;
        line-height: 1.4;
    }

    .user {
        background: var(--bubble-user);
        color: white;
        margin-left: auto;
    }

    .assistant {
        background: var(--bubble-assistant);
        color: var(--fg);
        margin-right: auto;
    }
</style>
</head>

<body>
<div id="chat-container"></div>

<div id="input-bar">
    <input id="input" placeholder="Type a message...">
    <button id="send">Send</button>
</div>

<script>
let config = null;
let configLoaded = false;

let ws = null;
let session = null;

function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.textContent = text;
    document.getElementById("chat-container").appendChild(div);
    div.scrollIntoView();
}

async function loadConfig() {
    config = await fetch("/config").then(r => r.json());
    console.log("WEB UI MODE:", config.ollama.mode);
    configLoaded = true;

    if (config.ollama.mode === "chat") {
        connectWS();
    }
}

function connectWS() {
    ws = new WebSocket(`ws://${location.host}/ws/chat`);

    ws.onopen = () => console.log("WS connected");
    ws.onclose = () => console.log("WS closed");

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        session = data.session;
        addMessage("assistant", data.reply);
    };
}

async function sendGenerate(text) {
    const resp = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
    }).then(r => r.json());

    addMessage("assistant", resp.reply);
}

document.getElementById("send").onclick = () => {
    if (!configLoaded) {
        console.warn("Config not loaded yet");
        return;
    }

    const text = document.getElementById("input").value.trim();
    if (!text) return;

    addMessage("user", text);
    document.getElementById("input").value = "";

    if (config.ollama.mode === "generate") {
        sendGenerate(text);
    } else {
        ws.send(JSON.stringify({ session, text }));
    }
};

loadConfig();
</script>
</body>
</html>
