<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lumin Web</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat {
      width: 480px;
      max-width: 100%;
      background: #020617;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      border-radius: 8px;
      background: #0b1120;
      font-size: 14px;
    }
    .msg {
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .msg.user { text-align: right; color: #93c5fd; }
    .msg.assistant { text-align: left; color: #e5e7eb; }
    .status {
      font-size: 12px;
      color: #64748b;
      min-height: 16px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    input[type="text"] {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
    }
    button {
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    button:disabled {
      background: #1f2937;
      cursor: default;
    }
    body.phone .chat {
    width: 100%;
    height: 100%;
    border-radius: 0;
    box-shadow: none;
  }

  body.phone .messages {
    font-size: 16px;
    padding: 12px;
  }

  body.phone input[type="text"] {
    font-size: 18px;
    padding: 12px;
  }

  body.phone button {
    font-size: 18px;
    padding: 12px 16px;
  }

  </style>
</head>
<body>
  <div class="chat">
    <div class="messages" id="messages"></div>
    <div class="status" id="status"></div>
    <div class="input-row">
      <input id="input" type="text" placeholder="Type a message..." />
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const statusEl = document.getElementById("status");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    
    const uiMode = "browser"; // or "phone"
    document.body.classList.add(uiMode);

    let ws = null;
    let currentAssistantMsg = null;

    function appendMessage(text, role) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function connect() {
      ws = new WebSocket("ws://" + window.location.host + "/ws/chat");

      ws.onopen = () => {
        statusEl.textContent = "Connected";
      };

      ws.onclose = () => {
        statusEl.textContent = "Disconnected";
      };

      ws.onerror = (e) => {
        statusEl.textContent = "Error";
        console.error(e);
      };

      ws.onmessage = (event) => {
          let data;

          // Try JSON first
          try {
              data = JSON.parse(event.data);
          } catch {
              // Plain text fallback
              data = event.data;
          }

          // If backend sent plain text, treat it as a final assistant message
          if (typeof data === "string") {
              currentAssistantMsg = appendMessage(data, "assistant");
              messagesEl.scrollTop = messagesEl.scrollHeight;
              currentAssistantMsg = null;
              return;
          }

          // Structured JSON messages
          if (data.type === "status") {
              if (data.state === "thinking") {
                  statusEl.textContent = "Lumin is thinking…";
              } else {
                  statusEl.textContent = "";
              }
              return;
          }

          if (data.type === "token") {
              if (!currentAssistantMsg) {
                  currentAssistantMsg = appendMessage(data.text, "assistant");
              } else {
                  currentAssistantMsg.textContent += data.text;
              }
              messagesEl.scrollTop = messagesEl.scrollHeight;
              return;
          }

          if (data.type === "final") {
              if (!currentAssistantMsg) {
                  currentAssistantMsg = appendMessage(data.text, "assistant");
              } else {
                  currentAssistantMsg.textContent = data.text;
              }
              messagesEl.scrollTop = messagesEl.scrollHeight;
              currentAssistantMsg = null;
              return;
          }

          if (data.type === "error") {
              appendMessage("Error: " + data.message, "assistant");
              return;
          }
      };
    }

    connect();

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      appendMessage(text, "user");
      ws.send(JSON.stringify({ text }));
      inputEl.value = "";
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
