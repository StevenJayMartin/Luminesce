<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lumin Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --bg: #111;
        --fg: #eee;
        --bubble-user: #1e88e5;
        --bubble-assistant: #333;
        --input-bg: #222;
        --input-fg: #fff;
        --accent: #1e88e5;
    }

    /* Light theme */
    .light-theme {
        --bg: #f5f5f5;
        --fg: #222;
        --bubble-user: #1976d2;
        --bubble-assistant: #ddd;
        --input-bg: #fff;
        --input-fg: #222;
        --accent: #1976d2;
    }

    body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    /* Layout containers */
    #chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        box-sizing: border-box;
    }

    #input-bar {
        display: flex;
        padding: 10px;
        background: var(--input-bg);
        border-top: 1px solid #444;
    }

    #input {
        flex: 1;
        padding: 10px;
        border: none;
        outline: none;
        background: var(--input-bg);
        color: var(--input-fg);
        font-size: 16px;
    }

    #send {
        padding: 10px 20px;
        background: var(--accent);
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
        margin-left: 10px;
    }

    /* Message bubbles */
    .msg {
        max-width: 80%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 12px;
        line-height: 1.4;
    }

    .user {
        background: var(--bubble-user);
        color: white;
        margin-left: auto;
    }

    .assistant {
        background: var(--bubble-assistant);
        color: var(--fg);
        margin-right: auto;
    }

    /* Phone mode */
    .phone-mode #chat-container {
        padding: 10px;
    }

    .phone-mode .msg {
        max-width: 95%;
        font-size: 1.1em;
    }

    /* Browser mode */
    .browser-mode #chat-container {
        max-width: 900px;
        margin: 0 auto;
    }

    /* Animations */
    .animate .msg {
        animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>
<div id="chat-container"></div>

<div id="input-bar">
    <input id="input" placeholder="Type here..." />
    <button id="send">Send</button>
</div>

<script>
let ws = null;
let session = null;
let config = null;

/* ---------------------------------------------------
   Load config.json
--------------------------------------------------- */
async function loadConfig() {
    config = await fetch("/config").then(r => r.json());
    applyUiMode(config.ui.mode);
    applyTheme(config.ui.theme);
    applyAnimations(config.ui.animations);
}

/* ---------------------------------------------------
   UI Mode Switching
--------------------------------------------------- */
function applyUiMode(mode) {
    const root = document.documentElement;

    root.classList.remove("phone-mode", "browser-mode");

    if (mode === "phone") {
        root.classList.add("phone-mode");
    } else if (mode === "browser") {
        root.classList.add("browser-mode");
    } else {
        // auto mode
        if (window.innerWidth < 600) {
            root.classList.add("phone-mode");
        } else {
            root.classList.add("browser-mode");
        }
    }
}

/* Auto mode reacts to window resize */
window.addEventListener("resize", () => {
    if (config && config.ui.mode === "auto") {
        applyUiMode("auto");
    }
});

/* ---------------------------------------------------
   Theme Switching
--------------------------------------------------- */
function applyTheme(theme) {
    const root = document.documentElement;
    root.classList.remove("light-theme");

    if (theme === "light") {
        root.classList.add("light-theme");
    }
}

/* ---------------------------------------------------
   Animation Toggle
--------------------------------------------------- */
function applyAnimations(enabled) {
    const root = document.documentElement;
    if (enabled) {
        root.classList.add("animate");
    } else {
        root.classList.remove("animate");
    }
}

/* ---------------------------------------------------
   WebSocket Chat
--------------------------------------------------- */
function connectWS() {
    ws = new WebSocket(`ws://${location.host}/ws/chat`);

    ws.onopen = () => console.log("WS connected");
    ws.onclose = () => console.log("WS closed");

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        session = data.session;
        addMessage("assistant", data.reply);
    };
}

/* ---------------------------------------------------
   Add message to UI
--------------------------------------------------- */
function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.textContent = text;
    document.getElementById("chat-container").appendChild(div);
    document.getElementById("chat-container").scrollTop = 
        document.getElementById("chat-container").scrollHeight;
}

/* ---------------------------------------------------
   Send message
--------------------------------------------------- */
document.getElementById("send").onclick = () => {
    const text = document.getElementById("input").value.trim();
    if (!text) return;

    addMessage("user", text);
    document.getElementById("input").value = "";

    ws.send(JSON.stringify({
        session: session,
        text: text
    }));
};

/* ---------------------------------------------------
   Startup
--------------------------------------------------- */
loadConfig();
connectWS();
</script>

</body>
</html>
