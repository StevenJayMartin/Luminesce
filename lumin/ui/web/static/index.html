<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lumin Web</title>

  <style>
    /* ---------- Base Layout ---------- */
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat {
      display: flex;
      flex-direction: column;
      background: #020617;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #0b1120;
    }

    /* ---------- Message Bubbles ---------- */
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.5;
      display: inline-block;
    }

    .msg.user {
      background: #1e3a8a;
      color: #dbeafe;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      background: #1e293b;
      color: #e2e8f0;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }

    .status {
      font-size: 12px;
      color: #64748b;
      min-height: 16px;
      padding: 0 16px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: #020617;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      font-size: 16px;
    }

    button {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:disabled {
      background: #1f2937;
      cursor: default;
    }

    /* ---------- Browser Mode (wide) ---------- */
    body.browser .chat {
      width: 100%;
      height: 100%;
      border-radius: 0;
      box-shadow: none;
    }

    /* ---------- Phone Mode (thin) ---------- */
    body.phone .chat {
      width: 480px;
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
  </style>
</head>

<body>
  <div class="chat">
    <div class="messages" id="messages"></div>
    <div class="status" id="status"></div>

    <div class="input-row">
      <input id="input" type="text" placeholder="Type a message..." />
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    /* Choose your mode */
    const uiMode = "browser";   // or "phone"
    document.body.classList.add(uiMode);

    const messagesEl = document.getElementById("messages");
    const statusEl = document.getElementById("status");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    let ws = null;
    let currentAssistantMsg = null;

    function appendMessage(text, role) {
      const bubble = document.createElement("div");
      bubble.className = "msg " + role;
      bubble.textContent = text;
      messagesEl.appendChild(bubble);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function connect() {
      ws = new WebSocket("ws://" + window.location.host + "/ws/chat");

      ws.onopen = () => statusEl.textContent = "Connected";
      ws.onclose = () => statusEl.textContent = "Disconnected";
      ws.onerror = () => statusEl.textContent = "Error";

      ws.onmessage = (event) => {
        let data;

        try { data = JSON.parse(event.data); }
        catch { data = event.data; }

        if (typeof data === "string") {
          currentAssistantMsg = appendMessage(data, "assistant");
          currentAssistantMsg = null;
          return;
        }

        if (data.type === "status") {
          statusEl.textContent = data.state === "thinking"
            ? "Lumin is thinking…"
            : "";
          return;
        }

        if (data.type === "token") {
          if (!currentAssistantMsg)
            currentAssistantMsg = appendMessage(data.text, "assistant");
          else
            currentAssistantMsg.textContent += data.text;

          messagesEl.scrollTop = messagesEl.scrollHeight;
          return;
        }

        if (data.type === "final") {
          if (!currentAssistantMsg)
            currentAssistantMsg = appendMessage(data.text, "assistant");
          else
            currentAssistantMsg.textContent = data.text;

          currentAssistantMsg = null;
          return;
        }

        if (data.type === "error") {
          appendMessage("Error: " + data.message, "assistant");
        }
      };
    }

    connect();

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      appendMessage(text, "user");
      ws.send(JSON.stringify({ text }));
      inputEl.value = "";
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
